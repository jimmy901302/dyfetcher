<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>抖音直播弹幕抓取 🔴 实时弹幕抓取 💬 多类型消息支持</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        "Helvetica Neue", Arial, "Noto Sans", "PingFang SC", "Microsoft YaHei",
        sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 24px;
      transition: background 0.2s ease, color 0.2s ease;
    }
    .container {
      width: 100%;
      max-width: 960px;
      background: rgba(15, 23, 42, 0.95);
      border-radius: 16px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(148, 163, 184, 0.3);
      padding: 20px 24px 24px;
      transition: background 0.2s ease, border-color 0.2s ease,
        box-shadow 0.2s ease;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .title {
      font-size: 20px;
      font-weight: 600;
    }
    .status {
      font-size: 13px;
      color: #9ca3af;
    }
    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #f97316;
      margin-right: 6px;
    }
    .control-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .input {
      flex: 1;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #374151;
      background: #020617;
      color: #e5e7eb;
      font-size: 14px;
      outline: none;
    }
    .input:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 1px rgba(99, 102, 241, 0.6);
    }
    .btn {
      padding: 10px 14px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      white-space: nowrap;
      transition: transform 0.08s ease, box-shadow 0.08s ease, opacity 0.08s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #4f46e5, #6366f1);
      color: white;
      box-shadow: 0 10px 30px rgba(79, 70, 229, 0.4);
    }
    .btn-secondary {
      background: #111827;
      color: #e5e7eb;
      border: 1px solid #374151;
    }
    .btn-ghost {
      background: transparent;
      color: #9ca3af;
      border: 1px solid #374151;
    }
    .btn:active {
      transform: translateY(1px);
      box-shadow: none;
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      box-shadow: none;
    }
    .hint {
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 8px;
    }
    .hint code {
      padding: 2px 4px;
      border-radius: 4px;
      background: #111827;
      color: #e5e7eb;
    }
    .danmu-box {
      margin-top: 10px;
      background: radial-gradient(circle at top, #020617 0, #020617 35%, #020617 100%);
      border-radius: 12px;
      border: 1px solid #1f2937;
      padding: 10px 10px 6px;
      height: 420px;
      display: flex;
      flex-direction: column;
    }
    .danmu-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .danmu-title {
      font-size: 14px;
      font-weight: 500;
    }
    .danmu-counter {
      font-size: 12px;
      color: #9ca3af;
    }
    .danmu-list {
      flex: 1;
      overflow-y: auto;
      padding-right: 4px;
      font-size: 13px;
      will-change: scroll-position;
      contain: layout paint;
    }
    .danmu-item {
      padding: 4px 6px;
      border-radius: 8px;
      margin-bottom: 4px;
      background: rgba(15, 23, 42, 0.9);
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }
    .danmu-time {
      font-size: 11px;
      color: #6b7280;
      min-width: 90px;
    }
    .danmu-type {
      font-size: 11px;
      color: #38bdf8;
    }
    .danmu-user-id {
      font-size: 11px;
      color: #9ca3af;
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .danmu-user {
      font-size: 12px;
      color: #fbbf24;
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .danmu-content {
      font-size: 13px;
      color: #e5e7eb;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .footer {
      margin-top: 10px;
      font-size: 11px;
      color: #6b7280;
      text-align: right;
    }

    .disclaimer {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      background: rgba(249, 115, 22, 0.1);
      border: 1px solid rgba(249, 115, 22, 0.3);
      font-size: 11px;
      color: #f97316;
      line-height: 1.6;
    }
    
    body.light .disclaimer {
      background: rgba(249, 115, 22, 0.05);
      border-color: rgba(249, 115, 22, 0.2);
      color: #ea580c;
    }

    .stats-row {
      margin-top: 6px;
      font-size: 11px;
      color: #9ca3af;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .stat-pill {
      padding: 2px 8px;
      border-radius: 999px;
      background: #020617;
      border: 1px solid #1f2937;
    }

    .csv-box {
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid #1f2937;
      background: #020617;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .csv-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: #9ca3af;
    }
    .csv-textarea {
      width: 100%;
      height: 200px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
        "Liberation Mono", "Courier New", monospace;
      font-size: 11px;
      background: #020617;
      color: #e5e7eb;
      border-radius: 8px;
      border: 1px solid #1f2937;
      padding: 6px 8px;
      outline: none;
    }

    /* 亮色模式覆盖 */
    body.light {
      background: #f3f4f6;
      color: #111827;
    }
    body.light .container {
      background: #ffffff;
      border-color: #e5e7eb;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.08);
    }
    body.light .status {
      color: #4b5563;
    }
    body.light .hint {
      color: #6b7280;
    }
    body.light .hint code {
      background: #f3f4f6;
      color: #111827;
    }
    body.light .input {
      background: #ffffff;
      color: #111827;
      border-color: #d1d5db;
    }
    body.light .input:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 1px rgba(79, 70, 229, 0.5);
    }
    body.light .btn-secondary {
      background: #f9fafb;
      color: #111827;
      border-color: #d1d5db;
    }
    body.light .btn-ghost {
      border-color: #d1d5db;
      color: #4b5563;
    }
    body.light .danmu-box {
      background: #f9fafb;
      border-color: #e5e7eb;
    }
    body.light .danmu-item {
      background: #ffffff;
    }
    body.light .danmu-time {
      color: #9ca3af;
    }
    body.light .danmu-type {
      color: #0284c7;
    }
    body.light .danmu-user {
      color: #b45309;
    }
    body.light .danmu-content {
      color: #111827;
    }
    body.light .footer {
      color: #9ca3af;
    }
    body.light .stat-pill {
      background: #f3f4f6;
      border-color: #e5e7eb;
    }
    body.light .csv-box {
      background: #f9fafb;
      border-color: #e5e7eb;
    }
    body.light .csv-textarea {
      background: #ffffff;
      color: #111827;
      border-color: #e5e7eb;
    }
    
    /* 滚动条优化 */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #111827;
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb {
      background: #374151;
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #4b5563;
    }
    body.light ::-webkit-scrollbar-track {
      background: #f3f4f6;
    }
    body.light ::-webkit-scrollbar-thumb {
      background: #d1d5db;
    }

    @media (max-width: 640px) {
      .container {
        padding: 16px;
      }
      .header {
        flex-direction: column;
        align-items: flex-start;
        gap: 4px;
      }
      .control-row {
        flex-direction: column;
      }
      .danmu-box {
        height: 300px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="title">抖音直播弹幕抓取面板</div>
      <div style="display: flex; align-items: center; gap: 10px">
        <button id="themeToggleBtn" class="btn btn-ghost">
          切换白天/黑夜
        </button>
        <div class="status" id="statusText">
          <span class="status-dot" id="statusDot"></span>
          等待输入直播间 live_id
        </div>
      </div>
    </div>

    <div class="control-row">
      <input
        id="liveIdInput"
        class="input"
        placeholder="请输入直播间 live_id，例如：261378947940，然后按 Enter 或点击「开始抓取」"
      />
      <button id="startBtn" class="btn btn-primary">开始抓取</button>
      <button id="stopBtn" class="btn btn-secondary" disabled>停止抓取</button>
      <button id="clearBtn" class="btn btn-secondary">清空弹幕</button>
    </div>

    <div class="hint">
      - 按 <code>Enter</code> 相当于点击“开始抓取”<br />
      - “清空弹幕”只清理当前前端显示，不会影响后端采集<br />
      - 5~15秒后，前端会自动获取弹幕消息，无需手动刷新<br />
      - 支持切换白天/黑夜模式<br />
      - 支持下载CSV文件<br />
      - 支持清空弹幕<br />
      - 10分钟没人拉取就自动停止<br />
      - 单次请求最多启动2个直播间(直播号用空格隔开)<br />
    </div>

    <div class="danmu-box">
      <div class="danmu-header">
        <div class="danmu-title">弹幕流</div>
        <div class="danmu-counter">
          共 <span id="danmuCount">0</span> 条
        </div>
      </div>

      <div class="stats-row" id="statsRow">
        <span class="stat-pill">聊天: <span id="statChat">0</span></span>
        <span class="stat-pill">礼物: <span id="statGift">0</span></span>
        <span class="stat-pill">点赞: <span id="statLike">0</span></span>
        <span class="stat-pill">进场: <span id="statEnter">0</span></span>
        <span class="stat-pill">关注: <span id="statFollow">0</span></span>
        <span class="stat-pill">统计: <span id="statStats">0</span></span>
        <span class="stat-pill">直播间: <span id="statRoom">0</span></span>
        <span class="stat-pill">表情: <span id="statEmoji">0</span></span>
      </div>

      <div class="stats-row" id="filterRow">
        <label class="stat-pill">
          <input type="checkbox" data-type="chat" checked /> 聊天
        </label>
        <label class="stat-pill">
          <input type="checkbox" data-type="gift" checked /> 礼物
        </label>
        <label class="stat-pill">
          <input type="checkbox" data-type="like" checked /> 点赞
        </label>
        <label class="stat-pill">
          <input type="checkbox" data-type="enter" checked /> 进场
        </label>
        <label class="stat-pill">
          <input type="checkbox" data-type="follow" checked /> 关注
        </label>
        <label class="stat-pill">
          <input type="checkbox" data-type="stats" checked /> 统计
        </label>
        <label class="stat-pill">
          <input type="checkbox" data-type="room" checked /> 直播间
        </label>
        <label class="stat-pill">
          <input type="checkbox" data-type="emoji" checked /> 表情
        </label>
      </div>

      <div id="danmuList" class="danmu-list"></div>
    </div>

    <div class="csv-box">
      <div class="csv-header">
        <span>CSV 视图</span>
        <div style="display: flex; gap: 8px">
          <button id="copyCsvBtn" class="btn btn-secondary">复制 CSV</button>
          <button id="downloadCsvBtn" class="btn btn-secondary">下载 CSV</button>
        </div>
      </div>
      <textarea id="csvView" class="csv-textarea" readonly></textarea>
    </div>

    <div class="footer">
      终端运行结果中的弹幕消息已实时映射到本页面显示。
    </div>

    <div class="disclaimer">
      <strong>⚠️ ：</strong>所有数据来源于抖音公开数据。
    </div>
  </div>

  <script>
    const API_BASE = "https://baojun.dpdns.org/";

    const liveIdInput = document.getElementById("liveIdInput");
    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const clearBtn = document.getElementById("clearBtn");
    const danmuList = document.getElementById("danmuList");
    const danmuCount = document.getElementById("danmuCount");
    const statusText = document.getElementById("statusText");
    const statusDot = document.getElementById("statusDot");
    const themeToggleBtn = document.getElementById("themeToggleBtn");
    const csvView = document.getElementById("csvView");
    const downloadCsvBtn = document.getElementById("downloadCsvBtn");
    const copyCsvBtn = document.getElementById("copyCsvBtn");
    const filterRow = document.getElementById("filterRow");

    const statEls = {
      chat: document.getElementById("statChat"),
      gift: document.getElementById("statGift"),
      like: document.getElementById("statLike"),
      enter: document.getElementById("statEnter"),
      follow: document.getElementById("statFollow"),
      stats: document.getElementById("statStats"),
      room: document.getElementById("statRoom"),
      emoji: document.getElementById("statEmoji"),
    };

    let currentLiveId = "";
    let pollingTimer = null;
    let cursor = 0;
    let isRunning = false;
    const MAX_MESSAGES = 500;
    const MAX_CSV_ROWS = 1000;
    const stats = { chat:0, gift:0, like:0, enter:0, follow:0, stats:0, room:0, emoji:0 };
    const allMessages = [];
    let csvUpdateScheduled = false;
    const typeFilters = { chat:true, gift:true, like:true, enter:true, follow:true, stats:true, room:true, emoji:true };

    const TYPE_LABEL_MAP = Object.freeze({
      chat:"聊天", gift:"礼物", like:"点赞", enter:"进场",
      follow:"关注", stats:"统计", room:"直播间", emoji:"表情",
      fansclub:"粉丝团", room_stats:"直播统计"
    });

    function setStatus(text, active) {
      statusDot.style.background = active ? "#22c55e" : "#f97316";
      statusText.innerHTML = `<span class="status-dot" style="background:${statusDot.style.background}"></span>${text}`;
    }

    function createDanmuItem(msg) {
      const item = document.createElement("div");
      item.className = "danmu-item";
      item.dataset.type = msg.type;

      const time = document.createElement("div");
      time.className = "danmu-time";
      time.textContent = msg.timestamp || new Date().toLocaleString();

      const type = document.createElement("div");
      type.className = "danmu-type";
      type.textContent = TYPE_LABEL_MAP[msg.type] || "其他";

      const userId = document.createElement("div");
      userId.className = "danmu-user-id";
      userId.textContent = msg.user_id || "";
      userId.title = msg.user_id || "";

      const user = document.createElement("div");
      user.className = "danmu-user";
      user.textContent = msg.user_name || "未知用户";
      user.title = msg.user_name || "";

      const content = document.createElement("div");
      content.className = "danmu-content";
      content.textContent = msg.content || "";
      content.title = msg.content || "";

      item.appendChild(time);
      item.appendChild(type);
      item.appendChild(userId);
      item.appendChild(user);
      item.appendChild(content);
      return item;
    }

    // ====================== 自动滚动到最新消息（核心） ======================
    function scrollToLatest() {
      danmuList.scrollTop = danmuList.scrollHeight;
    }

    function renderAllMessages() {
      const frag = document.createDocumentFragment();
      let cnt = 0;
      allMessages.forEach(m => {
        if (typeFilters[m.type]) {
          frag.appendChild(createDanmuItem(m));
          cnt++;
        }
      });
      danmuList.innerHTML = "";
      danmuList.appendChild(frag);
      danmuCount.textContent = cnt;
      scrollToLatest(); // 自动滚动
    }

    function renderSingleMessage(msg) {
      if (!typeFilters[msg.type]) return;
      danmuList.appendChild(createDanmuItem(msg));
      scrollToLatest(); // 每条新消息都自动滚动
      danmuCount.textContent = parseInt(danmuCount.textContent) + 1;
    }
    // ======================================================================

    function csvEscape(v) {
      if (v == null) return "";
      const s = String(v);
      return /[",\n\r]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
    }

    function updateCsvView() {
      const head = "timestamp,type,user_id,user_name,content";
      const lines = allMessages.slice(-MAX_CSV_ROWS).map(m => 
        [csvEscape(m.timestamp), csvEscape(m.type), csvEscape(m.user_id), csvEscape(m.user_name), csvEscape(m.content)].join(",")
      );
      const val = [head, ...lines].join("\n");
      if (csvView.value !== val) csvView.value = val;
    }

    function scheduleCsvUpdate() {
      if (!csvUpdateScheduled) {
        csvUpdateScheduled = true;
        setTimeout(() => { updateCsvView(); csvUpdateScheduled = false; }, 200);
      }
    }

    function handleNewMessage(msg) {
      if (!msg.timestamp) msg.timestamp = new Date().toLocaleString();
      if (msg.type && stats[msg.type] !== undefined) {
        stats[msg.type]++;
        statEls[msg.type].textContent = stats[msg.type];
      }
      allMessages.push(msg);
      if (allMessages.length > MAX_MESSAGES) allMessages.shift();
      renderSingleMessage(msg);
      scheduleCsvUpdate();
    }

    function clearDanmu() {
      danmuList.innerHTML = "";
      danmuCount.textContent = "0";
      Object.keys(stats).forEach(k => { stats[k] = 0; statEls[k].textContent = "0"; });
      allMessages.length = 0;
      csvView.value = "";
      cursor = 0;
    }

    async function startFetch() {
      const raw = liveIdInput.value.trim();
      if (!raw) { alert("请输入 live_id"); liveIdInput.focus(); return; }
      const ids = raw.split(/[,\s，；;]+/).map(s=>s.trim()).filter(Boolean).slice(0,2);
      if (!ids.length) { alert("无效ID"); return; }

      currentLiveId = ids[0];
      cursor = 0;
      startBtn.disabled = true;
      stopBtn.disabled = false;
      isRunning = true;
      setStatus(`连接中：${currentLiveId}`, true);

      try {
        const r = await fetch(`${API_BASE}/api/start`, {
          method:"POST", headers:{"Content-Type":"application/json"},
          body:JSON.stringify({live_id:ids})
        });
        const d = await r.json();
        if (!r.ok || d.error) throw new Error(d.error || "启动失败");
        setStatus(`已连接：${currentLiveId}`, true);
      } catch(e) {
        console.error(e);
        setStatus(`失败：${e.message}`, false);
        alert(e.message);
        isRunning = false;
        startBtn.disabled = false;
        stopBtn.disabled = true;
        return;
      }

      if (pollingTimer) clearInterval(pollingTimer);
      pollingTimer = setInterval(pollComments, 1000);
    }

    async function pollComments() {
      if (!currentLiveId || !isRunning) return;
      try {
        const r = await fetch(`${API_BASE}/api/comments?live_id=${encodeURIComponent(currentLiveId)}&cursor=${cursor}&limit=200`);
        const d = await r.json();
        if (!r.ok || d.error) throw new Error(d.error);
        const list = d.comments || [];
        if (d.next_cursor != null) cursor = parseInt(d.next_cursor,10)||cursor;
        if (Array.isArray(list) && list.length) list.forEach(handleNewMessage);
      } catch(e) { if (isRunning) setStatus(`轮询异常：${e.message}`, false); }
    }

    async function stopFetch() {
      if (pollingTimer) clearInterval(pollingTimer);
      pollingTimer = null;
      try {
        await fetch(`${API_BASE}/api/stop`, {
          method:"POST", headers:{"Content-Type":"application/json"},
          body:JSON.stringify({live_id:currentLiveId})
        });
      }catch(e){}
      isRunning = false; currentLiveId=""; cursor=0;
      startBtn.disabled = false; stopBtn.disabled = true;
      setStatus("已停止", false);
    }

    // 事件
    startBtn.onclick = startFetch;
    stopBtn.onclick = stopFetch;
    clearBtn.onclick = clearDanmu;

    liveIdInput.addEventListener("keydown", e=>{
      if (e.key==="Enter" && !startBtn.disabled) { e.preventDefault(); startFetch(); }
    });

    themeToggleBtn.onclick = ()=>{
      const l = document.body.classList.toggle("light");
      themeToggleBtn.textContent = l ? "切换黑夜模式" : "切换白天模式";
      localStorage.setItem("theme", l?"light":"dark");
    };

    downloadCsvBtn.onclick = ()=>{
      if (!csvView.value) { alert("无数据"); return; }
      const blob = new Blob(["\uFEFF"+csvView.value], {type:"text/csv;charset=utf-8"});
      const u = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href=u; a.download = `抖音弹幕_${currentLiveId||"unknown"}_${new Date().toISOString().replace(/[:.]/g,"-")}.csv`;
      a.click(); setTimeout(()=>{URL.revokeObjectURL(u);},100);
    };

    copyCsvBtn.onclick = async ()=>{
      if (!csvView.value) { alert("无数据"); return; }
      try { await navigator.clipboard.writeText(csvView.value); alert("已复制"); }
      catch(e){ alert("复制失败"); }
    };

    filterRow.onchange = e=>{
      const t = e.target;
      if (t.matches('input[data-type]')) {
        typeFilters[t.dataset.type] = t.checked;
        renderAllMessages();
      }
    };

    window.onbeforeunload = ()=>{
      if (isRunning && currentLiveId) navigator.sendBeacon(`${API_BASE}/api/stop`, JSON.stringify({live_id:currentLiveId}));
    };

    // 初始化主题
    if (localStorage.getItem("theme")==="light") {
      document.body.classList.add("light");
      themeToggleBtn.textContent = "切换黑夜模式";
    }

    setStatus("等待输入直播间 live_id", false);
  </script>
</body>
</html>
